name: Send Mail

on:
  push:

jobs:
  mail:
    runs-on: ubuntu-latest

    steps:
      - name: Print a mail box
        run: echo "mail box"

      - name: Sending a mail
        if: always()
        uses: dawidd6/action-send-mail@v3

        with:
          server_address: smtp.gmail.com
          server_port: 465

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: Mail Title
          body: Your message

          to: mahagowri09@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}